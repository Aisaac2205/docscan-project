version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: docscan_db
      POSTGRES_USER: docscan_user
      POSTGRES_PASSWORD: docscan_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docscan_user -d docscan_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://docscan_user:docscan_password@postgres:5432/docscan_db
      JWT_SECRET: docscan-jwt-secret-key-2024-production
      JWT_EXPIRATION: 24h
      NODE_ENV: production
      PORT: 3001
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  uploads:
